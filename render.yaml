services:
  # Frontend — React SPA (Vite)
  - type: web
    name: pakfreelanceforntend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      # SPA catch-all: serve index.html for every route that isn't a real file
      - type: rewrite
        source: /*
        destination: /index.html
